<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Queue System Pro v3</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{background:#0d0d0d;color:white;font-family:sans-serif}
.hidden{display:none}
</style>
</head>

<body class="flex justify-center p-4">

<div class="w-full max-w-md bg-[#161616] p-5 rounded-xl">

<!-- ================= LOGIN ================= -->
<div id="auth">
<h2 class="text-xl mb-3">Login</h2>

<input id="email" class="w-full p-2 bg-[#1f1f1f] mb-2" placeholder="Email">
<input id="pass" class="w-full p-2 bg-[#1f1f1f] mb-2" placeholder="Password">

<button onclick="login()" class="w-full bg-sky-400 text-black py-2">
Login
</button>
</div>

<!-- ================= DASH ================= -->
<div id="dash" class="hidden">

<h2 class="text-xl">Welcome <span id="uname"></span></h2>

<select id="service" class="w-full bg-[#1f1f1f] p-2 mt-3">
<option>Oil Change</option>
<option>Brake Service</option>
<option>Engine Tune</option>
</select>

<button onclick="joinQueue()" class="w-full bg-sky-400 text-black py-2 mt-3">
Join Queue
</button>

<button onclick="openHistory()" class="w-full bg-neutral-700 py-2 mt-2">
History
</button>

</div>

<!-- ================= QUEUE ================= -->
<div id="queue" class="hidden text-center">
<h2>Queue</h2>
<p id="qtext"></p>
<p id="qtimer" class="text-sky-400 text-2xl"></p>
</div>

<!-- ================= SERVING ================= -->
<div id="serving" class="hidden text-center">

<h2 class="text-amber-400">Service In Progress</h2>

<div class="bg-neutral-800 h-2 mt-3">
<div id="bar" class="bg-amber-400 h-2 w-0"></div>
</div>

<p id="status" class="text-sm mt-2"></p>

</div>

<!-- ================= PAYMENT ================= -->
<div id="cashier" class="hidden text-center">
<h2>Cashier</h2>

<button onclick="finish()" class="w-full bg-sky-400 text-black py-2 mt-3">
Pay & Complete
</button>
</div>

<!-- ================= HISTORY ================= -->
<div id="history" class="hidden">

<h2 class="text-xl">History</h2>
<div id="hlist"></div>

<button onclick="back()" class="w-full bg-sky-400 py-2 mt-3">
Back
</button>

</div>

<!-- ================= ADMIN ================= -->
<div id="admin" class="hidden">

<h2 class="text-emerald-400 text-xl">Admin Panel</h2>

<button onclick="callNext()" class="w-full bg-emerald-500 text-black py-2 mt-3">
Call Next
</button>

<button onclick="startService()" class="w-full bg-amber-500 text-black py-2 mt-2">
Start Service
</button>

<button onclick="forceComplete()" class="w-full bg-red-500 text-black py-2 mt-2">
Force Complete
</button>

<p id="ainfo" class="mt-3 text-sm"></p>

</div>

</div>

<script>

/* ================= CORE DB ================= */
let DB = JSON.parse(localStorage.getItem("DB") || `{
"users":[],
"queue":[],
"active":null,
"nextQueue":1,
"history":{}
}`);

let user=null;

/* ================= SAVE ================= */
function save(){
localStorage.setItem("DB",JSON.stringify(DB));
}

/* ================= NAV STATE ================= */
function show(id){
["auth","dash","queue","serving","cashier","history","admin"]
.forEach(x=>document.getElementById(x).classList.add("hidden"));
document.getElementById(id).classList.remove("hidden");
}

/* ================= LOGIN ================= */
function login(){

user = DB.users.find(u=>u.email==email.value && u.pass==pass.value);

if(!user) return alert("invalid");

uname.innerText=user.name;

/* ADMIN */
if(user.email==="admin@ce.com"){
show("admin");
return;
}

show("dash");
}

/* ================= JOIN QUEUE ================= */
function joinQueue(){

DB.queue.push({
id:DB.nextQueue++,
user:user.email,
service:service.value,
status:"waiting",
time:Date.now()
});

save();

showQueue();
runQueue();
}

/* ================= QUEUE ENGINE ================= */
function runQueue(){

let t=30;

let i=setInterval(()=>{

t--;

qtext.innerText="Queue #" + (DB.nextQueue-1);
qtimer.innerText=t + " sec";

if(t<=0){
clearInterval(i);

DB.active = DB.queue.shift();
DB.active.status="called";
save();

startService();
}

},1000);
}

/* ================= ADMIN CONTROL ================= */
function callNext(){

if(DB.queue.length==0){
ainfo.innerText="No queue";
return;
}

DB.active = DB.queue.shift();
DB.active.status="called";
save();

ainfo.innerText="Called #" + DB.active.id;
}

/* ================= SERVICE ================= */
function startService(){

show("serving");

let p=0;

let i=setInterval(()=>{

p+=2;
bar.style.width=p+"%";

if(p<40) status.innerText="Inspecting";
else if(p<80) status.innerText="Repairing";
else status.innerText="Final checks";

if(p>=100){
clearInterval(i);
DB.active.status="done";
save();
setTimeout(()=>show("cashier"),800);
}

},120);
}

/* ================= FORCE COMPLETE ================= */
function forceComplete(){
DB.active=null;
ainfo.innerText="Reset active job";
}

/* ================= PAYMENT ================= */
function finish(){

if(!DB.history[user.email]) DB.history[user.email]=[];

DB.history[user.email].push({
service:DB.active.service,
queue:DB.active.id,
date:new Date().toLocaleString()
});

save();
show("dash");
}

/* ================= HISTORY ================= */
function openHistory(){

hlist.innerHTML="";

let h=DB.history[user.email]||[];

if(h.length==0){
hlist.innerHTML="No history";
}

h.forEach(x=>{
let d=document.createElement("div");
d.className="bg-[#1f1f1f] p-2 mt-2";
d.innerHTML=`#${x.queue} ${x.service}<br><span class='text-gray-400'>${x.date}</span>`;
hlist.appendChild(d);
});

show("history");
}

/* ================= QUEUE UI ================= */
function showQueue(){
show("queue");
qtext.innerText="Waiting in system...";
qtimer.innerText="";
}

/* ================= BACK ================= */
function back(){show("dash");}

</script>

</body>
</html>
