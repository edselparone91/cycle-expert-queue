<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Queue Service App</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f0f10;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .card {
        width: 360px;
        background: #1a1b1e;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    h2 { text-align: center; }

    input, select {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border: none;
        border-radius: 6px;
        background: #2a2b2f;
        color: white;
    }

    button {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border: none;
        border-radius: 6px;
        background: #6aa9ff;
        cursor: pointer;
        font-weight: bold;
    }

    button:hover {
        background: #4f93ff;
    }

    .hidden { display: none; }

    .queue-box {
        text-align: center;
        padding: 20px;
        border: 1px solid #333;
        border-radius: 10px;
        margin-top: 10px;
    }

    .step {
        font-size: 12px;
        opacity: 0.7;
        text-align: center;
    }
</style>
</head>

<body>

<!-- REGISTER -->
<div class="card" id="registerPage">
    <h2>Create Account</h2>
    <input id="regUser" placeholder="Username"/>
    <input id="regPass" type="password" placeholder="Password"/>
    <button onclick="register()">Register</button>
</div>

<!-- LOGIN -->
<div class="card hidden" id="loginPage">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username"/>
    <input id="loginPass" type="password" placeholder="Password"/>
    <button onclick="login()">Login</button>
</div>

<!-- SERVICE -->
<div class="card hidden" id="servicePage">
    <h2>Select Service</h2>
    <select id="serviceType">
        <option>Oil Change</option>
        <option>Engine Tune-up</option>
        <option>Brake Service</option>
        <option>Car Wash</option>
    </select>
    <button onclick="goQueue()">Join Queue</button>
</div>

<!-- QUEUE -->
<div class="card hidden" id="queuePage">
    <h2>You're in Queue</h2>
    <div class="queue-box">
        <p>Queue No: <b id="queueNo"></b></p>
        <p>Estimated Wait: <b>21 minutes</b></p>
    </div>
    <button onclick="goPayment()">Proceed to Payment</button>
</div>

<!-- PAYMENT -->
<div class="card hidden" id="paymentPage">
    <h2>Payment</h2>
    <p>Service Fee: $45</p>
    <button onclick="completeService()">Pay Now</button>
</div>

<!-- COMPLETE -->
<div class="card hidden" id="completePage">
    <h2>Service Complete ✔</h2>
    <p style="text-align:center;">Thank you for using our service!</p>
</div>

<script>
let currentUser = null;
let queueNumber = 1;

// check account existence
function checkAccount() {
    return localStorage.getItem("user");
}

// navigation helper
function show(page) {
    document.querySelectorAll(".card").forEach(c => c.classList.add("hidden"));
    document.getElementById(page).classList.remove("hidden");
}

// REGISTER
function register() {
    let u = document.getElementById("regUser").value;
    let p = document.getElementById("regPass").value;

    if (!u || !p) return alert("Fill all fields");

    localStorage.setItem("user", JSON.stringify({user: u, pass: p}));
    alert("Account created!");
    show("loginPage");
}

// LOGIN (Rule: must have account)
function login() {
    let stored = JSON.parse(localStorage.getItem("user"));
    if (!stored) {
        alert("No account found. Please register first.");
        show("registerPage");
        return;
    }

    let u = document.getElementById("loginUser").value;
    let p = document.getElementById("loginPass").value;

    if (u === stored.user && p === stored.pass) {
        currentUser = u;
        show("servicePage");
    } else {
        alert("Invalid credentials");
    }
}

// SERVICE → QUEUE
function goQueue() {
    let service = document.getElementById("serviceType").value;
    document.getElementById("queueNo").innerText = queueNumber++;

    show("queuePage");
}

// QUEUE → PAYMENT
function goPayment() {
    show("paymentPage");
}

// PAYMENT → COMPLETE
function completeService() {
    show("completePage");
}

// INITIAL CHECK
window.onload = () => {
    if (!checkAccount()) {
        show("registerPage");
    } else {
        show("loginPage");
    }
};
</script>

</body>
</html>
